name: CI + Deploy (admin)

on:
  pull_request:
    branches: [ "main", "staging" ]
  push:
    branches: [ "main", "staging" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Validate composer
        run: composer validate --no-check-publish

      # Optional: add tests/static analysis later
      # - run: composer install
      # - run: php artisan test

  # ─── Production deploy (main branch) ───────────────────────────────
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ ci ]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          port: ${{ secrets.HOSTINGER_PORT }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            LOCKFILE="/tmp/admin_deploy.lock"
            exec 9>"$LOCKFILE"
            flock -n 9 || { echo "Another deploy is running. Exiting."; exit 1; }

            set -euo pipefail

            export PHP="/opt/cloudlinux/alt-php83/root/usr/bin/php"
            export COMPOSER_BIN="/usr/local/bin/composer"
            export APP_DIR="${{ secrets.DEPLOY_PATH }}"

            echo "=== PRODUCTION DEPLOY ==="
            echo "Using PHP:"
            "$PHP" -v
            echo "Using Composer:"
            "$PHP" "$COMPOSER_BIN" -V

            cd "$APP_DIR"

            # Use SSH for Git
            git remote set-url origin git@github.com:alafdal-news/dashboard.git

            echo "Pull latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Install prod dependencies (PHP 8.3 CLI)..."
            "$PHP" "$COMPOSER_BIN" install --no-dev --prefer-dist --optimize-autoloader --no-interaction

            echo "Fix permissions (safe default)..."
            chmod -R 775 storage bootstrap/cache || true

            echo "Clear caches safely..."
            "$PHP" artisan optimize:clear || true

            rm -f bootstrap/cache/packages.php bootstrap/cache/services.php bootstrap/cache/config.php || true

            echo "Rebuild caches..."
            "$PHP" artisan package:discover --ansi
            "$PHP" artisan config:cache
            "$PHP" artisan route:cache
            "$PHP" artisan view:cache

            echo "Run database migrations..."
            "$PHP" artisan migrate --force

            echo "Production deployment done ✅"

  # ─── Staging deploy (staging branch) ────────────────────────────────
  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    needs: [ ci ]
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          port: ${{ secrets.HOSTINGER_PORT }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            LOCKFILE="/tmp/admin_staging_deploy.lock"
            exec 9>"$LOCKFILE"
            flock -n 9 || { echo "Another staging deploy is running. Exiting."; exit 1; }

            set -euo pipefail

            export PHP="/opt/cloudlinux/alt-php83/root/usr/bin/php"
            export COMPOSER_BIN="/usr/local/bin/composer"
            export APP_DIR="${{ secrets.STAGING_DEPLOY_PATH }}"

            echo "=== STAGING DEPLOY ==="
            echo "Using PHP:"
            "$PHP" -v
            echo "Using Composer:"
            "$PHP" "$COMPOSER_BIN" -V

            cd "$APP_DIR"

            # Use SSH for Git
            git remote set-url origin git@github.com:alafdal-news/dashboard.git

            echo "Pull latest code..."
            git fetch origin staging
            git reset --hard origin/staging

            echo "Install dependencies (PHP 8.3 CLI)..."
            "$PHP" "$COMPOSER_BIN" install --no-dev --prefer-dist --optimize-autoloader --no-interaction

            echo "Fix permissions (safe default)..."
            chmod -R 775 storage bootstrap/cache || true

            echo "Clear caches safely..."
            "$PHP" artisan optimize:clear || true

            rm -f bootstrap/cache/packages.php bootstrap/cache/services.php bootstrap/cache/config.php || true

            echo "Rebuild caches..."
            "$PHP" artisan package:discover --ansi
            "$PHP" artisan config:cache
            "$PHP" artisan route:cache
            "$PHP" artisan view:cache

            echo "Run database migrations..."
            "$PHP" artisan migrate --force

            echo "Staging deployment done ✅"


